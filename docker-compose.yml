version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-game-bot
    restart: unless-stopped


    env_file:
      - .env

    environment:
      - TZ=Europe/Moscow
      - DB_PATH=/app/data/bot_database.db
      - HTTPS_PROXY=${APP_PROXY:-}
      - HTTP_PROXY=${APP_PROXY:-}
      - ALL_PROXY=${APP_PROXY:-}
      - PROXY_URL=${APP_PROXY:-}

    # Тома для сохранения данных
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
      # - ./custom.env:/app/.env:ro

    # Сетевые настройки
    networks:
      - bot-network

    # Ресурсы
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

    # Логи
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Сети
networks:
  bot-network:
    driver: bridge

# Тома (persistent storage)
volumes:
  bot_data:
    name: ai-game-bot-data
  bot_logs:
    name: ai-game-bot-logs